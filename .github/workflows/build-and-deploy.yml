name: Build and Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18.20.x
          cache: npm

      - name: Verify backend starts
        run: |
          npm ci
          npm run build
          node server/index.mjs &
          sleep 2
          curl -sf http://127.0.0.1:1337/_health

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/molodostclub/molodost-backend:latest

      - name: Deploy API to server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_ADMIN_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull ghcr.io/molodostclub/molodost-backend:latest

            docker stop molodost-backend || true
            docker rm molodost-backend || true

            docker network create molodost_net || true

            docker run -d \
              --name molodost-backend \
              --network molodost_net \
              -p 1337:1337 \
              --memory="256m" \
              --memory-swap="256m" \
              --cpus="0.5" \
              --restart unless-stopped \
              --health-cmd="node -e \"fetch('http://127.0.0.1:1337/_health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"" \
              --health-interval=30s \
              --health-timeout=5s \
              --health-retries=3 \
              --health-start-period=20s \
              -e SMTP_USER="${{ secrets.SMTP_USER }}" \
              -e SMTP_PASS="${{ secrets.SMTP_PASS }}" \
              -e SMTP_HOST="${{ secrets.SMTP_HOST }}" \
              -e SMTP_TO="${{ secrets.SMTP_TO }}" \
              -e WHAPI_TOKEN="${{ secrets.WHAPI_TOKEN }}" \
              -e CORS_ORIGINS="https://molodost.club,https://www.molodost.club" \
              ghcr.io/molodostclub/molodost-backend:latest
